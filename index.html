  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #07090C;
      --text: rgba(255,255,255,0.92);
      --text-muted: rgba(255,255,255,0.68);
      --text-dim: rgba(255,255,255,0.50);
      --border: rgba(255,255,255,0.10);
      --border-2: rgba(255,255,255,0.14);
      --surface: rgba(255,255,255,0.04);
      --green: #05D471;
      --blue: #696DFA;
      --blue-light: #AAADFF;
    }

    body {
      font-family: 'Open Sans', -apple-system, sans-serif;
      background: linear-gradient(180deg, #07090C 0%, #050607 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      text-align: center;
      padding: 48px 20px 32px;
      max-width: 680px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    /* Logo */
    .logo {
      width: 64px;
      margin: 0 auto 24px;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 0.1s forwards;
    }
    .logo img { width: 100%; height: auto; display: block; }

    /* Heading */
    .brand {
      font-family: 'DM Sans', sans-serif;
      font-size: 44px;
      font-weight: 800;
      letter-spacing: 0.03em;
      line-height: 1.1;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 0.2s forwards;
    }
    .brand span {
      background: linear-gradient(135deg, rgba(255,255,255,0.95) 30%, var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .org-line {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 0.3s forwards;
    }

    /* Product cards */
    .products {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.6s ease-out 0.4s forwards;
    }

    .product {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 16px 24px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s ease, transform 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
    }
    .product:hover {
      border-color: var(--border-2);
      transform: translateY(-2px);
    }

    .product-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: grid;
      place-items: center;
    }

    .product-name {
      font-family: 'DM Sans', sans-serif;
      font-size: 17px;
      font-weight: 700;
    }

    .product-desc {
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-muted);
    }

    .badge-live {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border-radius: 6px;
    }

    .badge-live-white {
      background: rgba(5,212,113,0.10);
      border: 1px solid rgba(5,212,113,0.22);
      color: var(--green);
    }

    .badge-soon {
      background: rgba(251,146,60,0.10);
      border: 1px solid rgba(251,146,60,0.30);
      color: #FB923C;
    }

    /* Trust section */
    .trusted-by-customers {
      margin: 32px 0;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.10);
      opacity: 0;
      animation: fadeUp 0.6s ease-out 0.5s forwards;
    }
    .trusted-by-customers-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    /* Community link */
    .community {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(5,212,113,0.08);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s ease, background-color 0.2s ease, color 0.2s ease;
      opacity: 0;
      animation: fadeUp 0.6s ease-out 0.55s forwards, btn-glow-pulse 3.5s ease-in-out 1.8s infinite;
    }
    .community::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 35%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(5,212,113,0.13), transparent);
      animation: shimmer-sweep 3.5s ease-in-out 1.8s infinite;
    }
    .community:hover {
      border-color: var(--green);
      background: rgba(5,212,113,0.14);
      color: var(--green);
    }

    /* Footer */
    .footer {
      margin-top: 48px;
      font-size: 11px;
      color: var(--text-dim);
      opacity: 0;
      animation: fadeIn 0.6s ease-out 0.6s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo breathe (Option C) ── */
    @keyframes logo-breathe {
      0%, 100% { opacity: 0.72; }
      50%       { opacity: 1; }
    }
    .logo img { animation: logo-breathe 3s ease-in-out 0.9s infinite; }

    /* ── Live badge dot blink (Option C) ── */
    @keyframes dot-blink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.25; transform: scale(0.55); }
    }
    .badge-live-white {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .badge-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      animation: dot-blink 1.5s ease-in-out infinite;
    }

    /* ── Shimmer C + glow on community button ── */
    @keyframes shimmer-sweep {
      0%   { transform: translateX(-100%) skewX(-15deg); opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { transform: translateX(300%) skewX(-15deg); opacity: 0; }
    }
    @keyframes btn-glow-pulse {
      0%, 100% { box-shadow: 0 0 0px 0 rgba(5,212,113,0); }
      50%       { box-shadow: 0 0 22px 0px rgba(5,212,113,0.20); }
    }

    /* ── Background electric lines ── */
    @keyframes line-appear {
      0%   { stroke-dashoffset: 800; opacity: 0; }
      5%   { opacity: 0.15; }
      50%  { stroke-dashoffset: 0; opacity: 0.15; }
      90%  { opacity: 0; }
      100% { stroke-dashoffset: -800; opacity: 0; }
    }
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .bg-lines .el {
      stroke: var(--green);
      stroke-width: 0.7;
      fill: none;
      stroke-dasharray: 800;
      stroke-dashoffset: 800;
      animation: line-appear 6s ease-in-out infinite;
      opacity: 0;
    }
    .bg-lines .el:nth-child(1) { animation-delay: 0s; }
    .bg-lines .el:nth-child(2) { animation-delay: 1.3s; }
    .bg-lines .el:nth-child(3) { animation-delay: 2.4s; }
    .bg-lines .el:nth-child(4) { animation-delay: 3.7s; }
    .bg-lines .el:nth-child(5) { animation-delay: 0.7s; }
    .bg-lines .el:nth-child(6) { animation-delay: 2s; }
    .bg-lines .el:nth-child(7) { animation-delay: 4.5s; }
    .bg-lines .el:nth-child(8) { animation-delay: 1.8s; }

    @media (max-width: 480px) {
      .brand { font-size: 34px; }
      .products { grid-template-columns: 1fr; }
      .product { padding: 24px 16px 20px; }
      .logo { width: 52px; }
    }
  </style>
</head>
<body>
  <!-- Background electric lines -->
  <div class="bg-canvas">
    <svg class="bg-lines" width="100%" height="100%" viewBox="0 0 400 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <line class="el" x1="-20" y1="160" x2="500" y2="240"/>
      <line class="el" x1="420" y1="0" x2="20" y2="420"/>
      <line class="el" x1="0" y1="500" x2="460" y2="340"/>
      <line class="el" x1="220" y1="-10" x2="170" y2="810"/>
      <line class="el" x1="-10" y1="320" x2="440" y2="560"/>
      <line class="el" x1="60" y1="800" x2="400" y2="100"/>
      <line class="el" x1="340" y1="-5" x2="90" y2="790"/>
      <line class="el" x1="-20" y1="640" x2="450" y2="120"/>
    </svg>
  </div>

  <div class="page">
    <div class="logo">
      <a href="/"><img src="assets/fa-mark-white-transparent.png" alt="FASTACCS" width="516" height="548"></a>
    </div>

    <h1 class="brand"><span>FASTACCS</span></h1>
    <p class="org-line">by FA Technologies</p>

    <div class="products">
      <a href="/logistics/" class="product">
        <span class="badge-live badge-live-white"><span class="badge-dot"></span>Live</span>
        <div class="product-icon" style="background: rgba(5,212,113,0.10); border: 1px solid rgba(5,212,113,0.22);">
          <svg width="20" height="20" fill="none" stroke="#05D471" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div class="product-name">FA Logistics</div>
        <div class="product-desc">Worldwide Gift Delivery. Send&nbsp;Love, Instantly, Anywhere.</div>
      </a>

      <a href="/smm/" class="product">
        <span class="badge-live badge-soon">Coming Soon</span>
        <div class="product-icon" style="background: rgba(5,212,113,0.10); border: 1px solid rgba(5,212,113,0.22);">
          <svg width="20" height="20" fill="none" stroke="#05D471" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        </div>
        <div class="product-name" style="color: var(--text);">FastAccounts SMM</div>
        <div class="product-desc">Your Trusted Marketplace for Social Media Accounts.</div>
      </a>
    </div>
    <div class="trusted-by-customers">
      <p class="trusted-by-customers-text">Trusted by over <span id="customerCount" style="color:var(--green);font-weight:700;display:inline-block;transition:font-size 0.3s cubic-bezier(0.34,1.56,0.64,1);">0</span> customers</p>
    </div>

    <a href="https://chat.whatsapp.com/L4pqTeTiKIF9AXcbpvMLCo" class="community" target="_blank" rel="noopener noreferrer" onclick="gtag('event', 'join_community', {'event_category': 'engagement', 'event_label': 'whatsapp_community'})">
      Join our community&ensp;→
    </a>

    <p class="footer">© 2026 FA Technologies LTD</p>
  </div>
  <script>
    (function () {
      function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
      var el = document.getElementById('customerCount');
      var target = 5000;
      var duration = 2600;
      var baseSize = 14; // px — matches .trusted-by-customers-text font-size
      var start = null;
      function step(ts) {
        if (!start) start = ts;
        var elapsed = ts - start;
        var progress = Math.min(elapsed / duration, 1);
        var eased = easeOutCubic(progress);
        var current = Math.round(target * eased);
        if (progress < 1) {
          // Font grows from baseSize up to baseSize*1.55 at peak, proportional to eased
          var growPx = baseSize + (baseSize * 0.55 * eased);
          el.style.fontSize = growPx.toFixed(1) + 'px';
          el.style.lineHeight = '1';
          el.textContent = current.toLocaleString();
          requestAnimationFrame(step);
        } else {
          el.textContent = '5,000+';
          // Pop: briefly overshoot then snap back via CSS transition
          el.style.fontSize = (baseSize * 1.7) + 'px';
          el.style.lineHeight = '1';
          setTimeout(function () {
            el.style.fontSize = '';
            el.style.lineHeight = '';
          }, 40);
        }
      }
      // Start after page entrance animations settle
      setTimeout(function () { requestAnimationFrame(step); }, 900);
    })();
  </script>
</body>
